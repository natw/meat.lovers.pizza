baseURL: "https://meat.lovers.pizza"

theme: nat

locale: "en-us"

title: "Nat"
author: "Nat Williams"
copyright: "Copyright © 2026, Nat Williams"

enableRobotsTXT: true

permalinks:
  blog: "/:slug/"
  tags: "/blog/:slug"

params:
  description: "some blog"
  favicon: "images/favicon.png"

markup:
  highlight:
    style: gruvbox
    lineNos: false
    lineNumbersInTable: false
    codeFences: true

security:
  exec:
    allow:
      - nvim
      - vim
