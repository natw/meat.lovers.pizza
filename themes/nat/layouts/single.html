{{ define "main" }}

<h1>{{ .Title }}</h1>
<p>
    <time datetime='{{ .Date.Format "2006-01-02" }}'>
      {{ .Date.Format "Jan 02, 2006" }}
    </time>
    {{ range (.GetTerms "tags") }}
    <a href="{{ .Permalink }}">#{{ .LinkTitle | lower }}</a>
    {{ end }}
</p>

<content>
  {{ .Content }}
</content>

{{ end }}
